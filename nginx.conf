server {
    listen       80;
    listen  [::]:80;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    server_tokens off;

    # Security headers (apply to all responses; nested locations below add no
    # add_header of their own, so they inherit these).
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), camera=(), microphone=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'" always;

    gzip on;
    gzip_types text/css application/javascript image/svg+xml application/json;
    gzip_min_length 256;

    # Lightweight health endpoint for the container HEALTHCHECK.
    location = /healthz {
        access_log off;
        default_type text/plain;
        return 200 "ok\n";
    }

    # Static assets — short cache, headers inherited from the server block.
    location ~* \.(js|css|svg|png|jpg|jpeg|ico|webp)$ {
        expires 1h;
    }

    # Clean URLs: /privacy serves /privacy.html.
    location / {
        try_files $uri $uri.html $uri/ =404;
    }
}
